name: Run Daily Scraper

on:
  workflow_dispatch: # Lehetővé teszi a kézi indítást a GitHub felületéről
  repository_dispatch:
    types: [run-scraper] # Külső webhook indításhoz (pl. cron-job.org)
  schedule:
    # 17 perces eltolás, hogy elkerüljük a kerek órákkor jelentkező GitHub szerver túlterhelést.
    # UTC 8:17, 10:17, 12:17 (Magyar idő szerint nyáron kb. 10:17, 12:17, 14:17)
    - cron: '17 8,10,12,14,16,18 * * *'

# Kifejezetten engedélyezzük a botnak, hogy fájlokat tölthessen fel (git push)
permissions:
  contents: write

# A Node.js figyelmeztetés eltüntetése (kényszerítjük a legújabb verzió használatát)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Letölti a kódodat a virtuális gépre
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Beállítja a Python környezetet
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. Telepíti a szükséges csomagokat a requirements.txt alapján
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lefuttatja a te szkriptedet
      - name: Run scraper
        run: python scraper.py

      # 5. Visszatölti a módosított CSV fájlt a repository-ba
      - name: Commit and push if CSV changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add tiszadorogma_adatok.csv
          # Csak akkor tölt fel, ha tényleg van új adat
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Automated daily data scrape"
            git push origin HEAD:main
          fi
